name: pages

# Build-less deploy of the static site in site/ to GitHub Pages.
# The site has no build step — site/ is uploaded as-is.
#
# It validates before it ships. This workflow used to run independently of validate.yml,
# so a red build still deployed. Gating on `make check` here — rather than on the other
# workflow's result — keeps the guarantee local: whatever is about to be uploaded is what
# was just checked, including on a manual dispatch.
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "scripts/**"
      - "Makefile"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Least privilege at the workflow level; the build job widens only what it needs.
permissions: {}

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate before shipping
        run: make check
      - uses: actions/configure-pages@v5
        # Create the Pages site on first run instead of failing when Pages is not yet enabled.
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
