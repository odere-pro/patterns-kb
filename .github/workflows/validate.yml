name: validate

# Read-only validation on every push and PR: the relationship graph and hub must be
# in sync with their generators, and no page may contain a dangling internal link.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Graph is in sync
        run: node scripts/build-graph.mjs --check
      - name: Hub is in sync
        run: node scripts/build-hub.mjs --check
      - name: No dangling internal links
        run: node scripts/check-links.mjs
      - name: Rendered relationships match the graph
        run: node scripts/audit-relations.mjs
