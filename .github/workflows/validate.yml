name: validate

# Read-only validation on every push and PR. The pages are the source of truth, so this
# checks that everything derived from them is in sync, that both closed vocabularies hold,
# and that no link dangles.
#
# It deliberately runs `make check` rather than re-listing the steps: the Makefile is the
# one definition of what "valid" means, so adding a check does not mean remembering to
# edit CI too. `make check` is also exactly what the local hook runs.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: make check
